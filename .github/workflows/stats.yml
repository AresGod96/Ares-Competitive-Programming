name: Update stats charts

# Regenerates assets/stats-*.svg (and the README summary line) from the repo
# whenever solutions or problem READMEs change, then commits the result.

on:
  push:
    branches: [master]
    paths-ignore:
      - "assets/**"
      - "scripts/gen-stats.mjs"
      - ".github/workflows/stats.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate charts
        run: node scripts/gen-stats.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain assets README.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets README.md
            git commit -m "chore: regenerate stats charts [skip ci]"
            git push
          else
            echo "Charts already up to date."
          fi
